server.port=${SERVER_PORT:8083}
spring.application.name=switch-notification-service

# SMTP notifications (Brevo)
spring.mail.host=${SMTP_HOST:smtp-relay.brevo.com}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=${SMTP_HOST:smtp-relay.brevo.com}
spring.mail.properties.mail.smtp.ssl.checkserveridentity=false

app.mail.from=${MAIL_FROM:}
app.mail.from-name=${MAIL_FROM_NAME:Switch Pagos}

management.endpoints.web.exposure.include=${MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE:health,info}
management.endpoint.health.show-details=${MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS:always}
