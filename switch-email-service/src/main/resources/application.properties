# Servidor del servicio de correo
server.port=${SERVER_PORT:8082}
spring.application.name=switch-email-service

# Configuración del buzón de correo
email.processor.input-dir=${EMAIL_PROCESSOR_INPUT_DIR:./email-inbox}
email.processor.processed-dir=${EMAIL_PROCESSOR_PROCESSED_DIR:./email-processed}
email.processor.error-dir=${EMAIL_PROCESSOR_ERROR_DIR:./email-errors}
email.processor.scan-interval=${EMAIL_PROCESSOR_SCAN_INTERVAL:30s}
email.processor.enabled=${EMAIL_PROCESSOR_ENABLED:true}

# Configuración de conexión al Switch principal
switch.api.base-url=${SWITCH_API_BASE_URL:http://localhost:8081}
switch.api.endpoint=${SWITCH_API_ENDPOINT:/api/payment-batch/upload-from-sftp-buzon}
switch.api.timeout=${SWITCH_API_TIMEOUT:30000}


# Logging
logging.level.root=${LOGGING_LEVEL_ROOT:INFO}
logging.level.ec.edu.espe.banquito.emailservice=${LOGGING_LEVEL_EC_EDU_ESPE_BANQUITO_EMAILSERVICE:DEBUG}
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# Actuator
management.endpoints.web.exposure.include=${MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE:health,info}
management.endpoint.health.show-details=${MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS:always}

# Configuración SFTP
sftp.host=${SFTP_HOST:localhost}
sftp.port=${SFTP_PORT:22}
sftp.username=${SFTP_USERNAME:sftpuser}
sftp.password=${SFTP_PASSWORD:}
sftp.remote.directory=${SFTP_REMOTE_DIRECTORY:/upload}
sftp.local.directory=${SFTP_LOCAL_DIRECTORY:./sftp-downloads}
sftp.integration.enabled=${SFTP_INTEGRATION_ENABLED:false}

# Scheduler SFTP
sftp.scheduler.enabled=${SFTP_SCHEDULER_ENABLED:true}
sftp.scheduler.interval=${SFTP_SCHEDULER_INTERVAL:60000}
