spring.application.name=banquito-core
server.port=${CORE_PORT:8080}

spring.datasource.url=${CORE_DATASOURCE_URL:${DB_URL:jdbc:mariadb://localhost:3307/banquito_core?createDatabaseIfNotExist=true&serverTimezone=America/Guayaquil&useSSL=false&allowPublicKeyRetrieval=true&disableSslHostnameVerification=true&useServerPrepStmts=true}}
spring.datasource.username=${CORE_DATASOURCE_USERNAME:${DB_USERNAME:root}}
spring.datasource.password=${CORE_DATASOURCE_PASSWORD:${DB_PASSWORD:1234}}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

spring.jpa.hibernate.ddl-auto=${CORE_JPA_DDL_AUTO:update}
spring.jpa.show-sql=${CORE_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true

management.endpoints.web.exposure.include=health,info
