spring.application.name=banquito-core
server.port=${CORE_PORT:8080}

spring.datasource.url=${DB_URL:jdbc:mariadb://localhost:3306/banquito_core?serverTimezone=America/Guayaquil&useSSL=false&allowPublicKeyRetrieval=true&disableSslHostnameVerification=true&useServerPrepStmts=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:1234}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

spring.jpa.hibernate.ddl-auto=${CORE_JPA_DDL_AUTO:update}
spring.jpa.show-sql=${CORE_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true

management.endpoints.web.exposure.include=health,info

# Mail Configuration
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:noreply@banquito.com}
spring.mail.password=${MAIL_PASSWORD:password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# Application Mail Config
app.mail.from=${MAIL_FROM:noreply@banquito.com}
app.mail.from-name=${MAIL_FROM_NAME:Banco BanQuito}
